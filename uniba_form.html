<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>【ユニバ🌎️】ワイワイし隊🎉 自己紹介フォーム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f7f6f2;
    --surface:#ffffff;
    --accent:#ff6b35;
    --accent2:#ffd166;
    --text:#1a1a1a;
    --text2:#666;
    --border:#e0ddd8;
    --radius:14px;
    --radius-sm:8px;
  }
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;padding:24px 16px 60px}
  .hero{text-align:center;padding:32px 0 24px}
  .hero-emoji{font-size:48px;display:block;margin-bottom:8px;animation:bounce 2s infinite}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .hero h1{font-size:22px;font-weight:700;line-height:1.4;color:var(--text)}
  .hero p{font-size:13px;color:var(--text2);margin-top:6px}
  .container{max-width:560px;margin:0 auto}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
  .section-label{font-size:10px;font-weight:700;letter-spacing:0.1em;color:var(--accent);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:6px}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border)}
  .field{margin-bottom:14px}
  .field:last-child{margin-bottom:0}
  .field label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px}
  .req{color:var(--accent);margin-left:2px}
  input[type=text],select,textarea{
    width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);
    font-size:14px;font-family:'Noto Sans JP',sans-serif;color:var(--text);
    background:#fff;outline:none;transition:border-color 0.15s;
  }
  input[type=text]:focus,select:focus,textarea:focus{border-color:var(--accent)}
  textarea{resize:vertical;min-height:80px;line-height:1.6}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .badge-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
  .badge{
    display:inline-flex;align-items:center;padding:7px 13px;
    border-radius:20px;border:1px solid var(--border);
    font-size:13px;color:var(--text2);cursor:pointer;
    background:#fff;transition:all 0.15s;user-select:none;
  }
  .badge input{display:none}
  .badge.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
  .ticket-group{display:flex;flex-direction:column;gap:8px;margin-top:4px}
  .ticket-opt{
    display:flex;align-items:flex-start;gap:10px;padding:12px 14px;
    border-radius:var(--radius-sm);border:1px solid var(--border);
    cursor:pointer;background:#fff;transition:all 0.15s;
  }
  .ticket-opt input{display:none}
  .ticket-opt.selected{background:#fff8f5;border-color:var(--accent)}
  .tick-dot{
    width:18px;height:18px;border-radius:50%;border:2px solid var(--border);
    margin-top:1px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    transition:all 0.15s;
  }
  .ticket-opt.selected .tick-dot{border-color:var(--accent);background:var(--accent)}
  .tick-dot::after{content:'';width:6px;height:6px;border-radius:50%;background:#fff;display:none}
  .ticket-opt.selected .tick-dot::after{display:block}
  .tick-title{font-size:13px;font-weight:500;color:var(--text)}
  .tick-desc{font-size:12px;color:var(--text2);margin-top:2px}
  .char-count{font-size:11px;color:var(--text2);text-align:right;margin-top:4px}
  .btn{
    width:100%;padding:14px;border-radius:var(--radius-sm);border:none;
    background:var(--accent);color:#fff;font-size:15px;font-weight:700;
    font-family:'Noto Sans JP',sans-serif;cursor:pointer;margin-top:8px;
    transition:opacity 0.15s,transform 0.1s;letter-spacing:0.03em;
  }
  .btn:hover{opacity:0.9}
  .btn:active{transform:scale(0.98)}
  .success{
    display:none;background:#fff8f5;border:1px solid #ffcab0;
    border-radius:var(--radius-sm);padding:14px 16px;
    font-size:14px;color:#c45000;margin-top:12px;text-align:center;line-height:1.6;
  }
  @media(max-width:480px){.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <span class="hero-emoji">🌎️</span>
    <h1>【ユニバ🌎️】ワイワイし隊🎉<br>自己紹介フォーム</h1>
    <p>入力した情報はメンバー名簿に反映されます</p>
  </div>

  <div class="card">
    <div class="section-label">基本情報</div>
    <div class="row">
      <div class="field">
        <label>ニックネーム<span class="req">*</span></label>
        <input type="text" id="nickname" placeholder="ディノ" maxlength="30">
      </div>
      <div class="field">
        <label>居住エリア<span class="req">*</span></label>
        <select id="area">
          <option value="">選択してください</option>
          <option>北海道・東北</option>
          <option>関東</option>
          <option>中部・東海</option>
          <option>近畿（関西）</option>
          <option>中国・四国</option>
          <option>九州・沖縄</option>
          <option>海外</option>
        </select>
      </div>
    </div>
    <div class="field" style="margin-top:14px">
      <label>リベシティ プロフィールURL</label>
      <input type="text" id="profile_url" placeholder="https://my.community.camp/users/..." maxlength="300">
      <p style="font-size:11px;color:var(--text2);margin-top:4px">リベシティのプロフィールページURLを貼り付けてください</p>
    </div>
  </div>

  <div class="card">
    <div class="section-label">活動内容</div>
    <div class="field">
      <label>メインの職業・活動</label>
      <select id="job_category">
        <option value="">選択してください</option>
        <option>会社員（副業なし）</option>
        <option>会社員＋副業</option>
        <option>フリーランス・個人事業主</option>
        <option>経営者・起業家</option>
        <option>投資家</option>
        <option>学生</option>
        <option>その他</option>
      </select>
    </div>
    <div class="field">
      <label>副業・活動の詳細（自由記述）</label>
      <input type="text" id="activity" placeholder="例：ブログ、動画編集、軽貨物ドライバー" maxlength="60">
    </div>
    <div class="field">
      <label>取り組んでいること・興味があること</label>
      <div class="badge-group" id="interest-group">
        <label class="badge"><input type="checkbox" value="投資・資産運用">投資・資産運用</label>
        <label class="badge"><input type="checkbox" value="AI">AI</label>
        <label class="badge"><input type="checkbox" value="家計管理">家計管理</label>
        <label class="badge"><input type="checkbox" value="スポーツ">スポーツ</label>
        <label class="badge"><input type="checkbox" value="宿題リスト">宿題リスト</label>
        <label class="badge"><input type="checkbox" value="ブログ・ライター">ブログ・ライター</label>
        <label class="badge"><input type="checkbox" value="動画・SNS">動画・SNS</label>
        <label class="badge"><input type="checkbox" value="プログラミング">プログラミング</label>
        <label class="badge"><input type="checkbox" value="デザイン">デザイン</label>
        <label class="badge"><input type="checkbox" value="物販・EC">物販・EC</label>
        <label class="badge"><input type="checkbox" value="コンサル・コーチング">コンサル・コーチング</label>
        <label class="badge"><input type="checkbox" value="読書・勉強">読書・勉強</label>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">パーク情報</div>
    <div class="field">
      <label>ユニバをどう回りたいか</label>
      <div class="badge-group" id="style-group">
        <label class="badge"><input type="checkbox" value="ガチ勢（全アトラクション制覇）">ガチ勢（全制覇）</label>
        <label class="badge"><input type="checkbox" value="ゆったり派（並ばず雰囲気重視）">ゆったり派</label>
        <label class="badge"><input type="checkbox" value="グルメ重視">グルメ重視</label>
        <label class="badge"><input type="checkbox" value="写真・フォト重視">写真・フォト重視</label>
        <label class="badge"><input type="checkbox" value="ショー・パレード重視">ショー・パレード重視</label>
        <label class="badge"><input type="checkbox" value="みんなに合わせる">みんなに合わせる</label>
      </div>
    </div>
    <div class="field" style="margin-top:14px">
      <label>パークミッションのチケット</label>
      <div class="ticket-group">
        <label class="ticket-opt">
          <input type="radio" name="ticket" value="あり（メンバー決まってる）">
          <div class="tick-dot"></div>
          <div><div class="tick-title">あり（メンバー決まってる）</div><div class="tick-desc">一緒に回るメンバーが確定しています</div></div>
        </label>
        <label class="ticket-opt">
          <input type="radio" name="ticket" value="あり（メンバー決まってない）">
          <div class="tick-dot"></div>
          <div><div class="tick-title">あり（メンバー決まってない）</div><div class="tick-desc">チケットはあるけど一緒に回る人を探してます</div></div>
        </label>
        <label class="ticket-opt">
          <input type="radio" name="ticket" value="なし">
          <div class="tick-dot"></div>
          <div><div class="tick-title">なし</div><div class="tick-desc">パークミッションのチケットは持っていません</div></div>
        </label>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">ひとこと</div>
    <div class="field">
      <label>ユニバへの意気込み</label>
      <textarea id="message" placeholder="楽しみにしていること、一緒にやりたいこと、意気込みなど！" maxlength="120"></textarea>
      <p class="char-count"><span id="msg-count">0</span>/120</p>
    </div>
  </div>

  <button class="btn" onclick="saveProfile()">名簿に登録する 🎉</button>
  <div class="success" id="success-msg">
    登録完了！🎉<br>名簿ページで確認してみてください。
  </div>
</div>

<script>
const KEY = 'uniba_members_v1';

document.querySelectorAll('.badge').forEach(b => {
  b.addEventListener('click', () => b.classList.toggle('selected'));
});
document.querySelectorAll('.ticket-opt').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('.ticket-opt').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
  });
});
document.getElementById('message').addEventListener('input', function(){
  document.getElementById('msg-count').textContent = this.value.length;
});

function saveProfile() {
  const nickname = document.getElementById('nickname').value.trim();
  const area = document.getElementById('area').value;
  if (!nickname || !area) { alert('ニックネームと居住エリアは必須です'); return; }
  const interests = [...document.querySelectorAll('#interest-group input:checked')].map(i => i.value);
  const styles = [...document.querySelectorAll('#style-group input:checked')].map(i => i.value);
  const ticket = document.querySelector('input[name="ticket"]:checked');
  const profile = {
    id: Date.now(), nickname, area,
    profile_url: document.getElementById('profile_url').value.trim(),
    job_category: document.getElementById('job_category').value,
    activity: document.getElementById('activity').value.trim(),
    interests, styles,
    ticket: ticket ? ticket.value : '',
    message: document.getElementById('message').value.trim(),
    registered_at: new Date().toISOString()
  };
  try {
    const existing = JSON.parse(localStorage.getItem(KEY) || '[]');
    existing.push(profile);
    localStorage.setItem(KEY, JSON.stringify(existing));
    document.getElementById('success-msg').style.display = 'block';
    document.getElementById('success-msg').scrollIntoView({behavior:'smooth'});
    // フォームリセット
    document.getElementById('nickname').value='';
    document.getElementById('area').value='';
    document.getElementById('profile_url').value='';
    document.getElementById('job_category').value='';
    document.getElementById('activity').value='';
    document.getElementById('message').value='';
    document.getElementById('msg-count').textContent='0';
    document.querySelectorAll('.badge').forEach(b=>b.classList.remove('selected'));
    document.querySelectorAll('.ticket-opt').forEach(o=>o.classList.remove('selected'));
    document.querySelectorAll('input[type=checkbox],input[type=radio]').forEach(i=>i.checked=false);
  } catch(e) {
    alert('保存に失敗しました。もう一度お試しください。');
  }
}
</script>
</body>
</html>
