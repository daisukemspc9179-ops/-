<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Web Tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f6fa; --surface: #ffffff; --border: #e2e6ef;
      --primary: #4f7ef8; --primary-dark: #3a63d8;
      --danger: #ef5350; --text: #1e2535; --text-muted: #6b7793;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(79,126,248,.08);
      --shadow-hover: 0 6px 24px rgba(79,126,248,.16);
      --cat-delivery: #ff7043; --cat-invest: #43a047;
      --cat-life: #039be5; --cat-ent: #ab47bc; --cat-other: #757575;
    }
    body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 20px 24px 16px; position: sticky; top: 0; z-index: 100; }
    .header-inner { max-width: 1100px; margin: 0 auto; }
    .header-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    header h1 { font-size: 1.4rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .header-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .view-toggle { display: flex; gap: 4px; background: var(--bg); border-radius: 8px; padding: 3px; }
    .view-toggle button { background: none; border: none; border-radius: 6px; padding: 6px 10px; cursor: pointer; color: var(--text-muted); font-size: 1.1rem; transition: background .15s, color .15s; }
    .view-toggle button.active { background: var(--surface); color: var(--primary); box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .btn { display: inline-flex; align-items: center; gap: 6px; border: none; border-radius: 8px; padding: 8px 16px; font-size: .85rem; font-weight: 700; cursor: pointer; transition: background .15s, transform .1s; white-space: nowrap; }
    .btn:hover { transform: scale(1.03); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-outline { background: var(--surface); color: var(--text-muted); border: 1.5px solid var(--border); }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
    .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .filter-btn { border: 1.5px solid var(--border); background: var(--surface); border-radius: 20px; padding: 5px 14px; font-size: .82rem; font-weight: 600; cursor: pointer; color: var(--text-muted); transition: all .15s; white-space: nowrap; }
    .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
    .filter-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .filter-btn[data-cat="仕事・副業系"].active { background: var(--cat-delivery); border-color: var(--cat-delivery); }
    .filter-btn[data-cat="投資・お金系"].active { background: var(--cat-invest); border-color: var(--cat-invest); }
    .filter-btn[data-cat="生活・家庭系"].active { background: var(--cat-life); border-color: var(--cat-life); }
    .filter-btn[data-cat="エンタメ・ゲーム系"].active { background: var(--cat-ent); border-color: var(--cat-ent); }
    .filter-btn[data-cat="その他"].active { background: var(--cat-other); border-color: var(--cat-other); }
    main { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }
    .count-label { font-size: .82rem; color: var(--text-muted); margin-bottom: 16px; }
    #tool-container.card-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }
    #tool-container.list-view { display: flex; flex-direction: column; gap: 12px; }
    .tool-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); transition: transform .2s, box-shadow .2s; display: flex; flex-direction: column; gap: 10px; }
    .tool-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
    .card-title { font-size: 1rem; font-weight: 700; line-height: 1.3; }
    .card-memo { font-size: .85rem; color: var(--text-muted); line-height: 1.6; flex: 1; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .card-actions { display: flex; gap: 6px; }
    #tool-container.list-view .tool-card { flex-direction: row; align-items: center; padding: 14px 20px; gap: 16px; }
    #tool-container.list-view .card-body { flex: 1; display: flex; flex-direction: column; gap: 3px; }
    #tool-container.list-view .card-title { font-size: .93rem; }
    #tool-container.list-view .card-memo { font-size: .8rem; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    #tool-container.list-view .card-footer { flex-shrink: 0; }
    #tool-container.card-view .card-body { display: contents; }
    .cat-tag { display: inline-block; border-radius: 20px; padding: 2px 10px; font-size: .73rem; font-weight: 700; white-space: nowrap; color: #fff; }
    .cat-tag[data-cat="仕事・副業系"] { background: var(--cat-delivery); }
    .cat-tag[data-cat="投資・お金系"] { background: var(--cat-invest); }
    .cat-tag[data-cat="生活・家庭系"] { background: var(--cat-life); }
    .cat-tag[data-cat="エンタメ・ゲーム系"] { background: var(--cat-ent); }
    .cat-tag[data-cat="その他"] { background: var(--cat-other); }
    .open-btn { display: inline-flex; align-items: center; gap: 5px; background: var(--primary); color: #fff; border: none; border-radius: 8px; padding: 7px 14px; font-size: .82rem; font-weight: 700; cursor: pointer; text-decoration: none; transition: background .15s; white-space: nowrap; }
    .open-btn:hover { background: var(--primary-dark); }
    .icon-btn { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border: 1.5px solid var(--border); background: var(--surface); border-radius: 8px; cursor: pointer; font-size: .9rem; color: var(--text-muted); transition: all .15s; }
    .icon-btn:hover { border-color: var(--primary); color: var(--primary); background: #f0f4ff; }
    .icon-btn.danger:hover { border-color: var(--danger); color: var(--danger); background: #fff5f5; }
    #empty-state { display: none; text-align: center; padding: 60px 20px; color: var(--text-muted); }
    #empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(30,37,53,.45); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: 16px; width: 100%; max-width: 500px; box-shadow: 0 16px 48px rgba(0,0,0,.18); animation: modalIn .2s ease; }
    @keyframes modalIn { from { opacity: 0; transform: translateY(16px) scale(.97); } to { opacity: 1; transform: none; } }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px 0; }
    .modal-title { font-size: 1.05rem; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--text-muted); }
    .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
    .field label { display: block; font-size: .82rem; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; }
    .field label span.req { color: var(--danger); }
    .field input, .field textarea, .field select { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: .9rem; font-family: inherit; color: var(--text); background: var(--bg); outline: none; transition: border-color .15s; }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--primary); background: #fff; }
    .field textarea { resize: vertical; min-height: 72px; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; padding: 0 24px 20px; }
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: #1e2535; color: #fff; padding: 10px 20px; border-radius: 24px; font-size: .85rem; font-weight: 600; z-index: 300; transition: transform .3s ease, opacity .3s ease; opacity: 0; pointer-events: none; }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #export-banner { display: none; background: #fff8e1; border: 1.5px solid #ffe082; border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; font-size: .85rem; color: #5d4037; align-items: center; gap: 12px; flex-wrap: wrap; }
    #export-banner.show { display: flex; }
    @media (max-width: 600px) {
      header h1 { font-size: 1.1rem; }
      #tool-container.card-view { grid-template-columns: 1fr; }
      #tool-container.list-view .tool-card { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="header-top">
      <h1>🛠️ My Web Tools</h1>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="openModal()">＋ ツールを追加</button>
        <div class="view-toggle">
          <button id="btn-card" class="active" onclick="setView('card')">⊞</button>
          <button id="btn-list" onclick="setView('list')">☰</button>
        </div>
      </div>
    </div>
    <div class="filters">
      <button class="filter-btn active" data-cat="ALL" onclick="setFilter('ALL')">すべて</button>
      <button class="filter-btn" data-cat="仕事・副業系" onclick="setFilter('仕事・副業系')">🚴 仕事・副業系</button>
      <button class="filter-btn" data-cat="投資・お金系" onclick="setFilter('投資・お金系')">💹 投資・お金系</button>
      <button class="filter-btn" data-cat="生活・家庭系" onclick="setFilter('生活・家庭系')">🏠 生活・家庭系</button>
      <button class="filter-btn" data-cat="エンタメ・ゲーム系" onclick="setFilter('エンタメ・ゲーム系')">🎮 エンタメ・ゲーム系</button>
      <button class="filter-btn" data-cat="その他" onclick="setFilter('その他')">📦 その他</button>
    </div>
  </div>
</header>
<main>
  <div id="export-banner">
    <span>⚠️ <strong>未保存の変更があります。</strong> GitHubに反映するにはtools.jsonをダウンロードして置き換えてください。</span>
    <button class="btn btn-outline" onclick="exportJson()" style="margin-left:auto">⬇ tools.json をダウンロード</button>
  </div>
  <div class="count-label" id="count-label"></div>
  <div id="tool-container" class="card-view"></div>
  <div id="empty-state"><div class="empty-icon">🔍</div><p id="empty-msg">該当するツールが見つかりませんでした</p></div>
</main>
<div class="modal-overlay" id="modal-overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">ツールを追加</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>タイトル <span class="req">*</span></label><input type="text" id="f-title" placeholder="例：配達ルート最適化ツール" /></div>
      <div class="field"><label>メモ・説明</label><textarea id="f-memo" placeholder="このツールの説明を書いてください"></textarea></div>
      <div class="field"><label>公開URL <span class="req">*</span></label><input type="url" id="f-url" placeholder="https://yourname.github.io/tool" /></div>
      <div class="field"><label>カテゴリ <span class="req">*</span></label>
        <select id="f-cat">
          <option value="">選択してください</option>
          <option value="仕事・副業系">🚴 仕事・副業系</option>
          <option value="投資・お金系">💹 投資・お金系</option>
          <option value="生活・家庭系">🏠 生活・家庭系</option>
          <option value="エンタメ・ゲーム系">🎮 エンタメ・ゲーム系</option>
          <option value="その他">📦 その他</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveItem()">追加する</button>
    </div>
  </div>
</div>
<div id="toast"></div>
<script>
  const STORAGE_KEY = 'my_web_tools';
  let allTools = [], currentFilter = 'ALL', currentView = 'card', editIndex = -1, isDirty = false;
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) { allTools = JSON.parse(saved); render(); }
  else { fetch('tools.json').then(r=>r.json()).then(data=>{allTools=data;save();render();}).catch(()=>showEmpty('tools.json の読み込みに失敗しました')); }
  function setFilter(cat){currentFilter=cat;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat));render();}
  function setView(view){currentView=view;document.getElementById('btn-card').classList.toggle('active',view==='card');document.getElementById('btn-list').classList.toggle('active',view==='list');document.getElementById('tool-container').className=view==='card'?'card-view':'list-view';}
  function render(){
    const filtered=currentFilter==='ALL'?allTools.map((t,i)=>({...t,_i:i})):allTools.map((t,i)=>({...t,_i:i})).filter(t=>t.category===currentFilter);
    const container=document.getElementById('tool-container'),empty=document.getElementById('empty-state'),cl=document.getElementById('count-label');
    container.innerHTML='';
    if(filtered.length===0){empty.style.display='block';document.getElementById('empty-msg').textContent=allTools.length===0?'まだツールがありません。「＋ ツールを追加」から登録しましょう！':'該当するツールが見つかりませんでした';cl.textContent='';return;}
    empty.style.display='none';cl.textContent=filtered.length+' 件のツール';
    filtered.forEach(tool=>{
      const card=document.createElement('div');card.className='tool-card';
      card.innerHTML='<div class="card-body"><div class="card-title">'+escHtml(tool.title)+'</div><div class="card-memo">'+escHtml(tool.memo||'')+'</div></div><div class="card-footer"><span class="cat-tag" data-cat="'+escHtml(tool.category)+'">'+escHtml(tool.category)+'</span><div class="card-actions"><a class="open-btn" href="'+escHtml(tool.url)+'" target="_blank" rel="noopener noreferrer">開く ↗</a><button class="icon-btn" onclick="openEdit('+tool._i+')">✏️</button><button class="icon-btn danger" onclick="deleteItem('+tool._i+')">🗑️</button></div></div>';
      container.appendChild(card);
    });
  }
  function openModal(){editIndex=-1;document.getElementById('modal-title').textContent='ツールを追加';document.getElementById('modal-save-btn').textContent='追加する';document.getElementById('f-title').value='';document.getElementById('f-memo').value='';document.getElementById('f-url').value='';document.getElementById('f-cat').value='';document.getElementById('modal-overlay').classList.add('open');setTimeout(()=>document.getElementById('f-title').focus(),80);}
  function openEdit(i){editIndex=i;const t=allTools[i];document.getElementById('modal-title').textContent='ツールを編集';document.getElementById('modal-save-btn').textContent='保存する';document.getElementById('f-title').value=t.title;document.getElementById('f-memo').value=t.memo||'';document.getElementById('f-url').value=t.url;document.getElementById('f-cat').value=t.category;document.getElementById('modal-overlay').classList.add('open');setTimeout(()=>document.getElementById('f-title').focus(),80);}
  function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
  function overlayClick(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}
  function saveItem(){const title=document.getElementById('f-title').value.trim(),memo=document.getElementById('f-memo').value.trim(),url=document.getElementById('f-url').value.trim(),cat=document.getElementById('f-cat').value;if(!title){alert('タイトルを入力してください');return;}if(!url){alert('URLを入力してください');return;}if(!cat){alert('カテゴリを選択してください');return;}const item={title,memo,url,category:cat};if(editIndex===-1){allTools.push(item);showToast('✅ ツールを追加しました');}else{allTools[editIndex]=item;showToast('✅ ツールを更新しました');}save();closeModal();render();markDirty();}
  function deleteItem(i){if(!confirm('「'+allTools[i].title+'」を削除しますか？'))return;allTools.splice(i,1);save();render();markDirty();showToast('🗑️ 削除しました');}
  function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(allTools));}
  function markDirty(){isDirty=true;document.getElementById('export-banner').classList.add('show');}
  function exportJson(){const blob=new Blob([JSON.stringify(allTools,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='tools.json';a.click();URL.revokeObjectURL(a.href);showToast('⬇ tools.json をダウンロードしました');}
  function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2800);}
  function showEmpty(msg){document.getElementById('empty-state').style.display='block';document.getElementById('empty-msg').textContent=msg;}
  function escHtml(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
</script>
</body>
</html>
